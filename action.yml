name: "parity-zero Security Reviewer"
description: "AI-powered security review for pull requests"
author: "parity-zero"

inputs:
  github_token:
    description: "GitHub token for API access (PR comments, changed files)"
    required: true
  api_url:
    description: "Optional backend ingest API URL (e.g. https://parity-zero.example.com)"
    required: false
    default: ""
  api_token:
    description: "Optional bearer token for backend ingest API authentication"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Fetch PR base for diff
      shell: bash
      run: |
        if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha }}" || true
        fi

    - name: Run parity-zero reviewer
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PARITY_ZERO_API_URL: ${{ inputs.api_url }}
        PARITY_ZERO_API_TOKEN: ${{ inputs.api_token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: python -m reviewer.action
