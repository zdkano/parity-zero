name: "parity-zero"
description: "AI-assisted security reviewer for GitHub pull requests"

inputs:
  github_token:
    description: "GitHub token for PR comment updates and GitHub API fallback"
    required: false
    default: ""
  api_url:
    description: "Optional backend ingest URL"
    required: false
    default: ""
  api_token:
    description: "Optional backend auth token"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Fetch PR base
      shell: bash
      run: |
        if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          git fetch --no-tags --prune --depth=1 origin "${{ github.event.pull_request.base.sha }}"
        fi

    - name: Run parity-zero reviewer
      shell: bash
      run: python -m reviewer.action
      env:
        PYTHONPATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PARITY_ZERO_API_URL: ${{ inputs.api_url }}
        PARITY_ZERO_API_TOKEN: ${{ inputs.api_token }}

        PARITY_REASONING_PROVIDER: ${{ env.PARITY_REASONING_PROVIDER }}
        PARITY_REASONING_MODEL: ${{ env.PARITY_REASONING_MODEL }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ env.OPENAI_API_BASE }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
